; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
; Explicit rather than relying on the board's implicit default -- this table
; provides two OTA app slots (app0/app1) plus otadata, required for the
; Update-library-based OTA endpoint in WebInterface.cpp. Assumes 4MB flash.
board_build.partitions = default.csv


; Library dependencies used by the project. These may be adjusted to specific
; versions if needed. They cover the SH1106 driver, async web server, async
; TCP, async ping, LittleFS and ArduinoJson for JSON handling.
lib_deps =
	me-no-dev/ESPAsyncWebServer@^3.6.0
	me-no-dev/AsyncTCP@^3.3.2
	bblanchon/ArduinoJson@^6.20.0
	olikraus/U8g2@^2.36.18
	marian-craciunescu/ESP32Ping
	ayushsharma82/ElegantOTA@^3.1.7

build_flags =
	-D MAX_HOSTS=20
	-D DEFAULT_PING_INTERVAL_SEC=3
	-D DEFAULT_PING_TIMEOUT_MS=1000
	-D ELEGANTOTA_USE_ASYNC_WEBSERVER=1