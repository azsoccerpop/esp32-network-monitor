<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ESP32 Network Monitor</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <h1>ESP32 Network Monitor</h1>

  <section id="hosts">
    <h2>Monitored Hosts</h2>
    <ul id="hostList"></ul>
    <form id="addHostForm">
      <input id="name" placeholder="Name" required>
      <input id="host" placeholder="Host or IP" required>
      <button>Add Host</button>
    </form>
  </section>

  <section id="settings">
    <h2>Settings</h2>
    <label>Brightness <input id="brightness" type="range" min="0" max="255"></label>
    <button id="saveSettings">Save</button>
  </section>

  <script src="/script.js"></script>
</body>
</html>
